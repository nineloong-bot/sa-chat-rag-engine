version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-sa_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sa_assistant}
      MYSQL_USER: ${MYSQL_USER:-sa_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sa_pass_2026}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
      --slow-query-log=ON
      --long-query-time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-sa_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sa-network

  redis:
    image: redis:7-alpine
    container_name: sa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-sa_redis_2026}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sa_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sa-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sa-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-sa_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-sa_rabbit_2026}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-sa_vhost}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - sa-network

  chromadb:
    image: ghcr.io/chroma-core/chroma:1.0.0
    container_name: sa-chromadb
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: FALSE
      IS_PERSISTENT: TRUE
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sa-network

  ollama:
    image: ollama/ollama:latest
    container_name: sa-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - sa-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  chromadb_data:
    driver: local
  ollama_data:
    driver: local

networks:
  sa-network:
    driver: bridge
